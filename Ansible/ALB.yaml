- name: ALB
  hosts: master
  become: true

  tasks:

   - name: Install cert-manager
     ansible.builtin.shell: kubectl --kubeconfig=/home/ansible/.kube/config apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.18.2/cert-manager.yaml

   - name: Create service account
     ansible.builtin.shell: |
      cat <<EOF | kubectl --kubeconfig=/home/ansible/.kube/config apply -f -
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      EOF

   - name: Install load balancer controller
     environment:
      KUBECONFIG: /home/ansible/.kube/config
     ansible.builtin.shell: |
      helm repo add eks https://aws.github.io/eks-charts
      helm repo update
      helm upgrade --install aws-load-balancer-controller \
      eks/aws-load-balancer-controller -n kube-system \
      --set clusterName=kubernetes \
      --set serviceAccount.create=false \
      --set serviceAccount.name=aws-load-balancer-controller \
      --set region={{ region }} \
      --set vpcId={{ vpc_id }}
