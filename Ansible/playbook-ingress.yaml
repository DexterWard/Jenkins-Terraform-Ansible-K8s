- name: Kubeadm master
  hosts: master
  become: true

  tasks:

   - name: Copy ingress manifest
     ansible.builtin.copy:
      src: templates/ingress.yaml
      dest: /tmp/ingress.yaml
      mode: "0644"

   - name: Apply ingress
     ansible.builtin.shell: kubectl --kubeconfig=/home/ansible/.kube/config apply -f /tmp/ingress.yaml

   - name: Wait for TargetGroupBinding to exist
     ansible.builtin.command:
      cmd: >
        kubectl
        --kubeconfig=/home/ansible/.kube/config
        get targetgroupbinding
        -n default
        -o json
     register: tgb
     changed_when: false
     until: (tgb.stdout | from_json).items | length > 0
     retries: 30
     delay: 10
 
   - name: Get Target Group ARN
     set_fact:
      tg_arn: "{{ tgb.resources[0].spec.targetGroupARN }}"

   - name: Wait for healthy targets
     amazon.aws.elb_target_info:
       target_group_arn: "{{ tg_arn }}"
     register: tg_health
     delegate_to: localhost
     until: >
        tg_health.target_health_descriptions
        | selectattr('target_health.state', 'equalto', 'healthy')
        | list
        | length > 0
     retries: 30
     delay: 10

   - name: Output readiness
     debug:
      msg: "ALB READY - TG healthy"