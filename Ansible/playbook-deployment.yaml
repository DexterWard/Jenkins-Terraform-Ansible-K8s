- name: Deployment
  hosts: master
  become: true

  tasks:

    - name: Render Deployment
      ansible.builtin.template:
        src: templates/deployment.yaml.j2
        dest: /tmp/deployment.yaml

    - name: Show rendered deployment
      ansible.builtin.shell: cat /tmp/deployment.yaml
      register: deployment_yaml

    - debug:
        var: deployment_yaml.stdout_lines

    - name: Apply Deployment
      ansible.builtin.shell: |
        kubectl --kubeconfig=/home/ansible/.kube/config apply -f /tmp/deployment.yaml

    - name: Copy service manifest
      ansible.builtin.copy:
        src: templates/service.yaml
        dest: /tmp/service.yaml
        mode: "0644"

    - name: Expose Deployment
      ansible.builtin.shell: |
        kubectl --kubeconfig=/home/ansible/.kube/config apply -f /tmp/service.yaml

    - name: Get TargetGroupBinding as JSON
      ansible.builtin.command:
      cmd: >
        kubectl
        --kubeconfig=/home/ansible/.kube/config
        get targetgroupbinding
        -n default
        -o json
      register: tgb_json
      changed_when: false

    - name: Extract ALB security group
      ansible.builtin.set_fact:
        alb_sg: >-
          {{
            (tgb_json.stdout | from_json).items[0]
            .spec.networking.ingress[0].from[0]
            .securityGroup.groupID
          }}                      

    - debug:
        var: alb_sg
