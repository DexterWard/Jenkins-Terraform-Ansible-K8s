- name: Kubeadm master
  hosts: master
  become: true

  tasks:

   - name: Set hostname
     ansible.builtin.shell: sudo hostnamectl set-hostname kubeadm-master

   - name: Wait for cloud-init to finish
     ansible.builtin.shell: cloud-init status --wait

   - name: Create kubeadm cluster
     ansible.builtin.shell: | 
      kubeadm init --pod-network-cidr=192.168.0.0/16 --kubernetes-version=1.32.0
     args:
      creates: /etc/kubernetes/admin.conf

   - name: Create kube directory
     ansible.builtin.file:
      path: /home/ansible/.kube
      owner: ansible
      group: ansible
      mode: '0755'
      recurse: true

   - name: Copy config file
     ansible.builtin.copy:
      src: /etc/kubernetes/admin.conf
      dest: /home/ansible/.kube/config
      mode: '0744'
      remote_src: true

   - name: Install tigera operator
     ansible.builtin.shell: |
      kubectl --kubeconfig=/home/ansible/.kube/config apply --server-side -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.1/manifests/tigera-operator.yaml

   - name: Copy Calico custom resources
     ansible.builtin.copy:
      src: custom-resources.yaml
      dest: /tmp/custom-resources.yaml
      mode: "0644"

   - name: Install Calico
     ansible.builtin.shell: |
      kubectl --kubeconfig=/home/ansible/.kube/config apply -f /tmp/custom-resources.yaml

   - name: Install helm
     ansible.builtin.shell: |
      curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
      chmod 700 get_helm.sh
      ./get_helm.sh

   - name: Print join command
     ansible.builtin.shell: |
      kubeadm token create --print-join-command > /tmp/join.sh

   - name: Fetch join file
     ansible.builtin.fetch:
      src: /tmp/join.sh
      dest: /tmp/join.sh
      flat: true

   - name: Wait before checking cluster
     ansible.builtin.pause:
      seconds: 30

   - name: Wait for nodes
     ansible.builtin.command:
      cmd: >
        kubectl --kubeconfig=/home/ansible/.kube/config wait --for=condition=Ready node/kubeadm-master --all --timeout=300s

   - name: Wait for Calico
     ansible.builtin.command:
      cmd: >
        kubectl --kubeconfig=/home/ansible/.kube/config wait --for=condition=Ready pod -l k8s-app=calico-node -n calico-system --timeout=600s

   - name: Wait for kube-proxy
     ansible.builtin.command:
      cmd: >
        kubectl --kubeconfig=/home/ansible/.kube/config wait --for=condition=Ready pod -l k8s-app=kube-proxy -n kube-system --timeout=600s

   - name: Wait for CoreDNS rollout
     ansible.builtin.command:
      cmd: >
        kubectl --kubeconfig=/home/ansible/.kube/config rollout status deployment/coredns -n kube-system --timeout=300s
