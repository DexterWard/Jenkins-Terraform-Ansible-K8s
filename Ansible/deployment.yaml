- name: Deployment
  hosts: master
  become: true

  tasks:

    - name: Create app deployment
      ansible.builtin.shell: |
        kubectl --kubeconfig=/home/ansible/.kube/config \
        create deployment demo-app \
        --image=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/my-project:latest \
        --replicas=2 \
        --dry-run=client -o yaml | \
        kubectl --kubeconfig=/home/ansible/.kube/config apply -f -
