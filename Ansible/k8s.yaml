- name: k8s
  hosts: master
  become: true

  tasks:

- name: Create deployment
     ansible.builtin.shell: |
      cat <<EOF | kubectl --kubeconfig=/home/ansible/.kube/config apply -f -
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: demo-app
      spec:
      replicas: 2
      selector:
        matchLabels:
          app: demo-app
      template:
        metadata:
          labels:
            app: demo-app
        spec:
          containers:
          - name: demo-app
            image: 764763463632.dkr.ecr.eu-central-1.amazonaws.com/my-project:latest

            env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: db-host

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: db-name

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: db-user

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: db-password
      EOF

   - name: Create service
     ansible.builtin.shell: |
      cat <<EOF | kubectl --kubeconfig=/home/ansible/.kube/config apply -f -
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      EOF

   - name: Create ingress
     ansible.builtin.shell: |
      cat <<EOF | kubectl --kubeconfig=/home/ansible/.kube/config apply -f -
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: aws-load-balancer-controller
        namespace: kube-system
      EOF