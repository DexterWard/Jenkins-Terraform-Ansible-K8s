- name: Kubeadm master
  hosts: master
  become: true

  tasks:

   - name: Set hostname
     ansible.builtin.shell: sudo hostnamectl set-hostname kubeadm-master

   - name: Create kubeadm cluster
     ansible.builtin.shell: | 
      kubeadm init --pod-network-cidr=192.168.0.0/16 --kubernetes-version=1.32.0
     args:
      creates: /etc/kubernetes/admin.conf

   - name: Create kube directory
     ansible.builtin.file:
      path: /home/ansible/.kube
      owner: ansible
      group: ansible
      mode: '0755'
      recurse: true

   - name: Copy config file
     ansible.builtin.copy:
      src: /etc/kubernetes/admin.conf
      dest: /home/ansible/.kube/config
      mode: '0744'
      remote_src: true

   - name: Untaint control plane node
     ansible.builtin.shell: |
      kubectl --kubeconfig=/home/ansible/.kube/config taint nodes --all node-role.kubernetes.io/control-plane-
     register: untaint_result
     failed_when:
      - untaint_result.rc != 0
      - "'not found' not in untaint_result.stderr"

   - name: Install tigera operator
     ansible.builtin.shell: |     
      kubectl --kubeconfig=/home/ansible/.kube/config apply --server-side -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.1/manifests/tigera-operator.yaml

   - name: Install calico
     ansible.builtin.shell: |
      kubectl --kubeconfig=/home/ansible/.kube/config apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.1/manifests/custom-resources.yaml

   - name: Install helm
     ansible.builtin.shell: |
      curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
      chmod 700 get_helm.sh
      ./get_helm.sh

   - name: Print join command
     ansible.builtin.shell: |
      kubeadm token create --print-join-command > /tmp/join.sh

   - name: Fetch file
     ansible.builtin.fetch:
      src: /tmp/join.sh
      dest: /tmp/join.sh
      flat: true
